name: Cachix

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

concurrency:
  group: cachix-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build ${{ matrix.name }}
    runs-on: ubuntu-latest
    env:
      CACHIX_CACHE_NAME: ${{ vars.CACHIX_CACHE_NAME }}
      CACHIX_AUTH_TOKEN: ${{ secrets.CACHIX_AUTH_TOKEN }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: server
            command: nix build .#nixosConfigurations.stefan.config.system.build.toplevel
          - name: desktop
            command: |
              nix build \
                .#nixosConfigurations.logan.config.system.build.toplevel \
                .#nixosConfigurations.richard.config.system.build.toplevel \
                .#nixosConfigurations.oliver.config.system.build.toplevel

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Nix
        uses: cachix/install-nix-action@v31
        with:
          extra_nix_config: |
            experimental-features = nix-command flakes

      - name: Configure Cachix
        if: env.CACHIX_CACHE_NAME != '' && env.CACHIX_AUTH_TOKEN != ''
        uses: cachix/cachix-action@v16
        with:
          name: ${{ env.CACHIX_CACHE_NAME }}
          authToken: ${{ env.CACHIX_AUTH_TOKEN }}

      - name: Build system
        run: ${{ matrix.command }}
